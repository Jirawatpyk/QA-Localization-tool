name: E2E Gate

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Shard ${{ matrix.shardIndex }}/3
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]

    env:
      # Supabase Cloud — required for E2E auth tests
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      # Story 1.7 onboarding tour test personas (required for onboarding-tour.spec.ts)
      E2E_FIRST_TIME_EMAIL: ${{ secrets.E2E_FIRST_TIME_EMAIL }}
      E2E_RETURNING_EMAIL: ${{ secrets.E2E_RETURNING_EMAIL }}
      # Story 2.8 project tour test personas (required for project-tour.spec.ts)
      E2E_PROJECT_TOUR_EMAIL: ${{ secrets.E2E_PROJECT_TOUR_EMAIL }}
      E2E_PROJECT_TOUR_RETURNING_EMAIL: ${{ secrets.E2E_PROJECT_TOUR_RETURNING_EMAIL }}
      # Pipeline + AI keys (real secrets for pipeline E2E tests)
      INNGEST_EVENT_KEY: ${{ secrets.INNGEST_EVENT_KEY }}
      INNGEST_SIGNING_KEY: ${{ secrets.INNGEST_SIGNING_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      # Inngest dev server — forces SDK to use local dev server instead of cloud
      # INNGEST_DEV=1 is REQUIRED when INNGEST_EVENT_KEY is also set,
      # otherwise the SDK sends events to Inngest Cloud (not localhost:8288)
      INNGEST_DEV: 1
      INNGEST_DEV_URL: http://localhost:8288

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Next.js dev server
        run: |
          npm run dev &
          echo "Waiting for Next.js on port 3000..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000 > /dev/null 2>&1; do sleep 1; done'
          echo "Next.js is ready"

      - name: Pre-warm Inngest API route
        run: |
          # Next.js dev mode uses on-demand compilation — the /api/inngest route
          # must be compiled BEFORE Inngest CLI tries to autodiscover functions.
          echo "Pre-warming /api/inngest route (triggers Next.js compilation)..."
          timeout 60 bash -c 'until curl -sf http://localhost:3000/api/inngest > /dev/null 2>&1; do sleep 2; done'
          echo "Inngest API route compiled successfully"

      - name: Start Inngest dev server
        run: |
          npx inngest-cli dev -u http://localhost:3000/api/inngest &
          echo "Waiting for Inngest dev server on port 8288..."
          timeout 60 bash -c 'until curl -sf http://localhost:8288 > /dev/null 2>&1; do sleep 1; done'
          echo "Inngest dev server is ready"

      - name: Sync and verify Inngest functions
        run: |
          # PUT triggers SDK handshake — Inngest discovers all registered functions
          echo "Triggering Inngest function sync (attempt 1)..."
          curl -v -X PUT http://localhost:3000/api/inngest 2>&1 || echo "WARN: PUT attempt 1 failed"
          sleep 5
          echo "Triggering Inngest function sync (attempt 2)..."
          curl -v -X PUT http://localhost:3000/api/inngest 2>&1 || echo "WARN: PUT attempt 2 failed"
          sleep 3
          echo "Inngest function sync complete"

      - name: Run E2E tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 3

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-traces-shard-${{ matrix.shardIndex }}
          path: test-results/
          retention-days: 7

  merge-reports:
    name: Merge E2E Reports
    if: always()
    needs: [e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v5
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged report
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
