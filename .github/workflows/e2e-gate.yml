name: E2E Gate

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      # Supabase Cloud — required for E2E auth tests
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      # Story 1.7 onboarding tour test personas (required for onboarding-tour.spec.ts)
      E2E_FIRST_TIME_EMAIL: ${{ secrets.E2E_FIRST_TIME_EMAIL }}
      E2E_RETURNING_EMAIL: ${{ secrets.E2E_RETURNING_EMAIL }}
      # Story 2.8 project tour test personas (required for project-tour.spec.ts)
      E2E_PROJECT_TOUR_EMAIL: ${{ secrets.E2E_PROJECT_TOUR_EMAIL }}
      E2E_PROJECT_TOUR_RETURNING_EMAIL: ${{ secrets.E2E_PROJECT_TOUR_RETURNING_EMAIL }}
      # Pipeline + AI keys (real secrets for pipeline E2E tests)
      INNGEST_EVENT_KEY: ${{ secrets.INNGEST_EVENT_KEY }}
      INNGEST_SIGNING_KEY: ${{ secrets.INNGEST_SIGNING_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      # Inngest dev server URL — enables pipeline E2E tests
      INNGEST_DEV_URL: http://localhost:8288

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Inngest dev server
        run: |
          npx inngest-cli@latest dev -u http://localhost:3000/api/inngest &
          echo "Waiting for Inngest dev server on port 8288..."
          timeout 30 bash -c 'until curl -sf http://localhost:8288 > /dev/null 2>&1; do sleep 1; done'
          echo "Inngest dev server is ready"

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
